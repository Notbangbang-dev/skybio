# ─────────────────────────────────────────────────────────────────────────────
#  nginx reverse-proxy — DEFAULT (HTTP-only) config.
#
#  HTTP-only and references NO TLS certificates, so `docker compose up -d` always
#  boots nginx cleanly on a fresh box. Run ./init-letsencrypt.sh to obtain a
#  Let's Encrypt cert and OVERWRITE this file with the HTTPS config.
# ─────────────────────────────────────────────────────────────────────────────

upstream app {
    server app:3000;
}

# Per-IP request-rate + concurrent-connection caps (L7 flood mitigation). Put
# Cloudflare in front for volumetric (L3/L4) protection.
limit_req_zone  $binary_remote_addr zone=web_rl:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_rl:10m;
limit_req_status 429;
limit_conn_status 429;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Backgrounds / music / videos can be large.
    client_max_body_size 150m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Serve uploaded media with range support (video seeking) and long timeouts.
    location /api/uploads/ {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_max_temp_file_size 0;
        proxy_read_timeout 3600s;
    }

    location / {
        limit_req  zone=web_rl burst=40 nodelay;
        limit_conn conn_rl 30;
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}
